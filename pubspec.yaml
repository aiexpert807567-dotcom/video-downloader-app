name: video_downloader_app
description: Paste a link, preview, and download videos with no login.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  dio: ^5.5.0
  firebase_core: ^3.15.0
  firebase_analytics: ^11.6.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  cupertino_icons: ^1.0.6
  gal: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
