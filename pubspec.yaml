name: video_downloader
description: Paste a link, preview, and download videos with no login.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  dio: ^5.5.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
 google_mobile_ads: ^6.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
